<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandarim Master PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1d28">
    
    <link rel="stylesheet" href="styles.css">
    
    <!-- Bibliotecas de compressão -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsoncrush@1.1.8/jsoncrush.min.js"></script>
</head>
<body>

<div id="splash">
    <img src="https://cdn-icons-png.flaticon.com/512/3898/3898098.png" alt="Icon">
    <h2>MANDARIM</h2>
</div>

<div class="container">
    <div class="voice-bar">
        <span>🎙️</span>
        <select id="voice-select"></select>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showSection('library')">📚 BIBLIOTECA</button>
        <button class="tab-btn" onclick="showSection('create')">➕ NOVO</button>
    </div>

    <div id="library" class="section active">
        <div class="dash-grid">
            <div class="dash-item" style="background: #3498db;"><span class="dash-label">Total</span><span id="dash-total" class="dash-value">0</span></div>
            <div class="dash-item" style="background: #f39c12;"><span class="dash-label">Revisar</span><span id="dash-review" class="dash-value">0</span></div>
            <div class="dash-item" style="background: #e74c3c;"><span class="dash-label">Streak</span><span id="dash-streak" class="dash-value">0</span></div>
            <div class="dash-item" style="background: #27ae60;"><span class="dash-label">Master</span><span id="dash-mastery" class="dash-value">0%</span></div>
        </div>

        <div class="hsk-section">
            <h4>🏆 DOMÍNIO HSK</h4>
            <div id="hsk-bars"></div>
        </div>

        <div id="deck-list"></div>

        <div class="actions">
            <button class="main-btn" onclick="generateSyncCode()">🔗 Gerar Código de Sync</button>
            <button class="main-btn" onclick="importViaCode()">📥 Receber via Código</button>
            <button class="main-btn" onclick="requestNotificationPermission()">🔔 Notificações</button>
            <div class="btn-group">
                <button class="main-btn secondary" onclick="exportJSON()">📤 Exportar JSON</button>
                <button class="main-btn secondary" onclick="document.getElementById('fileIn').click()">📥 Importar JSON</button>
            </div>
            <input type="file" id="fileIn" style="display:none" onchange="importJSON(event)">
        </div>
    </div>

    <div id="create" class="section">
        <div class="deck-card">
            <h3>Novo Baralho</h3>
            <input type="text" id="deck-name" placeholder="Nome do Baralho">
            <textarea id="bulk-input" placeholder="Hanzi;Pinyin - Tradução" rows="8"></textarea>
            <button class="main-btn" onclick="saveDeck()">Salvar Baralho</button>
        </div>
    </div>

    <div id="study-area" class="section">
        <div class="deck-card study-card">
            <div id="prog-text" class="progress-text">0/0</div>
            <div id="display-term" class="term" onclick="speakCurrent()">...</div>
            <div id="interaction-zone"></div>
            <div id="feedback" class="feedback"></div>
            <button id="next-btn" class="main-btn success-btn" onclick="processNext()">Próximo (Enter)</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
